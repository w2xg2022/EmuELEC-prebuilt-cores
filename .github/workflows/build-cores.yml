name: Build prebuilt cores

# 预编译 X98mini 15 平台的 libretro 核心(.so)+ DC/PSP 独立模拟器 + RetroArch(tarball),
# 发一个 Release;主建置 w2xg2022/EmuELEC 的 package.mk 直接下载,免在主建置里重编这些重核心。
# ★并行★:matrix 分组,一次触发 N 个 job 同时编。
# ★健壮★:每编好一个核心「立刻上传」再编下一个(不等全组编完),并清该核心 build/ 腾空间;
#   故 job 即使中途被砍(磁盘/时间),已编好的核心也已经在 Release 里,不会前功尽弃。
# ⚠️ ABI 耦合:主建置抓 releases/latest,工具链/glibc 一变就要重跑本 workflow。

on:
  workflow_dispatch:
    inputs:
      emuelec_ref:
        description: 'w2xg2022/EmuELEC 的 commit/branch/tag(留空用 main 最新)'
        required: false
        default: 'main'
      force:
        description: '强制重编(即使产物已在 Release 里也重新编;用于工具链/glibc 变更但 commit 短hash碰巧相同的极端情况)'
        type: boolean
        required: false
        default: false
      only_groups:
        description: '只跑指定的组(空格分隔,留空=全跑)。可选:mame2003plus mame2010 ra-psp dc-psp-lr mid light'
        required: false
        default: ''

permissions:
  contents: write

env:
  PROJECT: Amlogic-ce
  DEVICE: Amlogic-no
  SUBDEVICE: X98mini
  ARCH: aarch64
  DISTRO: EmuELEC
  STANDALONE_PKGS: "flycastsa PPSSPPSDL retroarch yabasanshiroSA_1_5"

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      sha: ${{ steps.p.outputs.sha }}
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      # NOTE(w2xg2022): matrix 由这里动态产生,好支援 only_groups 过滤。
      # (GitHub Actions 的 job 层级 if 取不到 matrix context,所以不能用 if 跳过某组;
      #  正解就是在 prepare 里先把 matrix 过滤好再喂给 build job。)
      - id: m
        run: |
          ALL='[
            {"group":"mame2003plus","cores":"mame2003-plus"},
            {"group":"mame2010","cores":"mame2010"},
            {"group":"ra-psp","cores":"retroarch PPSSPPSDL"},
            {"group":"dc-psp-lr","cores":"flycastsa ppsspp flycast yabasanshiroSA_1_5"},
            {"group":"mid","cores":"mupen64plus-nx fbneo pcsx_rearmed"},
            {"group":"light","cores":"nestopia snes9x genesis-plus-gx mgba dosbox-pure applewin beetle-pce"}
          ]'
          ONLY="${{ github.event.inputs.only_groups }}"
          if [ -z "$ONLY" ]; then
            M=$(echo "$ALL" | jq -c .)
            echo "only_groups 留空 → 全部组都跑"
          else
            M=$(echo "$ALL" | jq -c --arg only "$ONLY" '[.[] | select(($only | split(" ")) | index(.group))]')
            [ "$(echo "$M" | jq 'length')" -eq 0 ] && { echo "::error::only_groups='${ONLY}' 没匹配到任何组(可选:mame2003plus mame2010 ra-psp dc-psp-lr mid light)"; exit 1; }
          fi
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "本轮要跑的组: $(echo "$M" | jq -r '.[].group' | tr '\n' ' ')"

      - id: p
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.emuelec_ref }}" \
            https://github.com/w2xg2022/EmuELEC.git s
          SHA=$(cd s && git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          # ★必须建成 prerelease★:主建置的 package.mk 抓 releases/latest。若这里建一个「空的」
          # 普通 release,它立刻变成 latest → 主建置 curl -f 抓不到核心 → 404 直接失败,而且要
          # 等本轮编完(~2h)才填满;万一部分核心编失败就永久缺、主建置永久坏。
          # 所以先建 prerelease(不抢 latest,主建置继续用上一个完整 release),
          # 等 finalize job 核对 18 个产物齐全后才转正。
          gh release view "cores-$SHA" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "cores-$SHA" --repo "${{ github.repository }}" --prerelease \
              --title "Prebuilt cores (EmuELEC@$SHA)" \
              --notes "并行预编译中…(产物齐全前保持 prerelease,不抢 releases/latest)对应 w2xg2022/EmuELEC@$SHA 的工具链ABI。"

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    strategy:
      fail-fast: false
      # 组定义在 prepare 的 step m(动态产生,支援 only_groups 过滤)
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 1024
          swap-size-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Clone w2xg2022/EmuELEC
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.emuelec_ref }}" \
            https://github.com/w2xg2022/EmuELEC.git emuelec-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc make git unzip wget xz-utils libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
            libasound2-dev libgl1-mesa-dev build-essential libboost-all-dev cmake \
            fonts-droid-fallback libvlc-dev libvlccore-dev vlc-bin texinfo premake4 \
            golang libssl-dev curl patchelf xmlstarlet default-jre xsltproc \
            libvpx-dev rdfind tzdata xfonts-utils lzop \
            libparse-yapp-perl gperf libxml-parser-perl patchutils

      - name: Build+upload group [${{ matrix.group }}](逐核心,编好即传)
        working-directory: emuelec-src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: cores-${{ needs.prepare.outputs.sha }}
          GHREPO: ${{ github.repository }}
        run: |
          set +e
          OK=""; FAIL=""; SKIP=""
          # 核心 -> 产物文件名(默认 pkgname 的 - 换 _ 加 _libretro.so;少数例外单列)
          artifact_name() {
            case " ${STANDALONE_PKGS} " in *" $1 "*) echo "$1.tar.zst"; return;; esac
            case "$1" in
              beetle-pce) echo "mednafen_pce_fast_libretro.so" ;;
              mupen64plus-nx) echo "mupen64plus_next_libretro.so" ;;
              *) echo "$(echo "$1" | tr - _)_libretro.so" ;;
            esac
          }
          # ★commit 未变则不重编★:此 commit(=此 release tag)已有的产物就跳过,只补缺的。
          EXISTING=$(gh release view "$TAG" --repo "$GHREPO" --json assets --jq '.assets[].name' 2>/dev/null)
          for c in ${{ matrix.cores }}; do
            AN=$(artifact_name "$c")
            if [ "${{ github.event.inputs.force }}" != "true" ] && echo "$EXISTING" | grep -qxF "$AN"; then
              echo "⏭️ ${c}: 产物 ${AN} 已在 Release cores-<此commit> → 跳过(commit 没变、已编过)"
              SKIP="${SKIP} ${c}"; continue
            fi
            echo "::group::build ${c}"
            echo "[disk] $(df -h / | awk 'NR==2{print $4" free"}')"
            # ★USE_PREBUILT_CORES=no★:告诉主仓库的 package.mk「本仓库要从源码编,别走下载覆写」。
            # 否则会变成「预编译仓库跑这个包时又去下载自己」的循环,工具链一变就永远产不出新 .so
            # (2026-07-16 被 mame 上传成 9-byte "Not Found" 坐实)。
            USE_PREBUILT_CORES=no \
            PROJECT=${{ env.PROJECT }} DEVICE=${{ env.DEVICE }} SUBDEVICE=${{ env.SUBDEVICE }} \
            ARCH=${{ env.ARCH }} DISTRO=${{ env.DISTRO }} \
              ./scripts/build "${c}:target" 2>&1 | tee "../build-${c}.log"
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            BD=$(ls -d build.*/ 2>/dev/null | head -1)
            ART=""
            case " ${STANDALONE_PKGS} " in
              *" ${c} "*)
                d=$(ls -d "${BD}install_pkg/${c}-"* 2>/dev/null | head -1)
                if [ -n "$d" ] && [ -d "$d" ]; then
                  tar -I 'zstd -19 -T0' -cf "/tmp/${c}.tar.zst" -C "$d" . && ART="/tmp/${c}.tar.zst"
                fi ;;
              *)
                ART=$(find "${BD}install_pkg/${c}-"* -name '*_libretro.so' 2>/dev/null | head -1) ;;
            esac
            if [ -n "$ART" ] && [ -e "$ART" ]; then
              if gh release upload "$TAG" "$ART" --repo "$GHREPO" --clobber; then
                OK="${OK} ${c}"; echo "✅ 已上传 ${c} ($(basename "$ART"))"
              else
                FAIL="${FAIL} ${c}(上传失败)"
              fi
            else
              FAIL="${FAIL} ${c}(rc=${rc}无产物)"; echo "::warning::${c} 无产物(rc=${rc})"
            fi
            # 清掉该核心的 build/ 编译暂存腾空间(install_pkg已保留、产物已上传)
            rm -rf "${BD}build/${c}-"* /tmp/${c}.tar.zst 2>/dev/null
          done
          echo "==== 组[${{ matrix.group }}] 成功:${OK:-无} ===="
          echo "==== 组[${{ matrix.group }}] 跳过(commit未变已存在):${SKIP:-无} ===="
          echo "==== 组[${{ matrix.group }}] 失败:${FAIL:-无} ===="

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.group }}
          path: build-*.log
          retention-days: 14

  # ★保险:产物齐全才转正★
  # 全部 build job 跑完后核对 18 个产物在不在。齐了 → --prerelease=false --latest 正式接班;
  # 不齐 → 保持 prerelease,releases/latest 继续指向上一个「完整」的 release,主建置永远不会
  # 因为抓到半成品而 404 挂掉。补齐做法:重跑本 workflow(闸门会跳过已有的,只补缺的)。
  finalize:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: 核对产物齐全才转正为 latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: cores-${{ needs.prepare.outputs.sha }}
        run: |
          EXPECTED="mame2003_plus_libretro.so mame2010_libretro.so nestopia_libretro.so
            snes9x_libretro.so genesis_plus_gx_libretro.so mgba_libretro.so pcsx_rearmed_libretro.so
            fbneo_libretro.so dosbox_pure_libretro.so applewin_libretro.so mupen64plus_next_libretro.so
            mednafen_pce_fast_libretro.so ppsspp_libretro.so flycast_libretro.so
            flycastsa.tar.zst PPSSPPSDL.tar.zst retroarch.tar.zst yabasanshiroSA_1_5.tar.zst"
          HAVE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null)
          echo "=== 本轮 Release ($TAG) 现有产物 ==="; echo "$HAVE" | sed 's/^/  /'
          MISS=""
          for a in ${EXPECTED}; do echo "$HAVE" | grep -qxF "$a" || MISS="${MISS} ${a}"; done
          if [ -n "$MISS" ]; then
            echo "::error::产物不齐,缺:${MISS}"
            echo "→ 保持 prerelease;releases/latest 仍指向上一个完整 release,主建置不受影响。"
            echo "→ 补齐:重跑本 workflow(闸门会跳过已有的、只补缺的),或看对应 build-logs-* 查错。"
            exit 1
          fi
          echo "✅ 18 个产物齐全 → 转正为 latest"
          gh release edit "$TAG" --repo "${{ github.repository }}" --prerelease=false --latest \
            --notes "预编译核心齐全:14 个 libretro .so + 4 个 standalone tar.zst(flycastsa/PPSSPPSDL/retroarch/yabasanshiroSA_1_5)。全部从源码编译(USE_PREBUILT_CORES=no)。对应 w2xg2022/EmuELEC@${{ needs.prepare.outputs.sha }} 的工具链 ABI。"
